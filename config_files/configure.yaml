BasicSettings:
  ImageSize: 64
  ImageChannel: 3
  ReplayBufferOnGPU: True
  Seed: 3710
  Env_name: ALE/Pong-v5
  Device: cuda:0
  Use_amp: True
  Use_cg: True
  Compile: True
  SavePath: None

Evaluate:
   EpisodeNum: 10
   NumEnvs: 10
   DuringTraining: True
   EverySteps: 2000

JointTrainAgent:
  SampleMaxSteps: 105000 # Just to make sure the last episode will finish, no training after 100k
  BufferMaxLength: 100000
  WorldModelWarmUp: 1024
  BehaviourWarmUp: 1024
  SkipPretrain: True
  NumEnvs: 1 # 1
  BatchSize: 64 # 16
  BatchLength: 128
  ImagineBatchSize: 1024
  ImagineContextLength: 8
  ImagineBatchLength: 16
  RealityContextLength: 16
  TrainDynamicsEverySteps: 1
  TrainDynamicsEpoch: 1
  TrainAgentEverySteps: 1
  FreezeWorldModelAfterSteps: 100000
  FreezeBehaviourAfterSteps: 100000
  SaveEverySteps: 2000
  SaveModels: True
  Tau: 10
  ImaginationTau: 10
  Alpha: 1.0 # High focus on penalising high imagine counts regardless of train counts, less probability to be sampled
  Beta: 1.0 # High focus on penalising 

Demonstration:
  Enable: true
  Directory: demonstrations
  MaxFiles: 0
  StrictActionCheck: true
  DemoRatio: 0.2  # 데모 데이터를 방어할 최소 보장 비율을 여기에 추가합니다.

Models:
  WorldModel:
    dtype: float32
    Backbone: Mamba3 # Mamba, Mamba2, Mamba3, Transformer
    InChannels: 3
    Act: SiLU
    CategoricalDim: 32
    ClassDim: 64 # 32
    HiddenStateDim: 1024 # 512
    Optimiser: Laprop
    LatentDiscreteType: naive
    Max_grad_norm: 1000
    Warmup_steps: 1000
    Dropout: 0.1
    Unimix_ratio: 0.01
    Weight_decay: 1.0e-4
    RewardConcat:
      Enable: false
    DynamicLossHarmonization:
      Enable: false
      HarmonizeBeta: 0.99
      WeightBeta: 0.9
      CoreTargetScale: 1.0    # 핵심 로스의 목표 체급 (기본 1.0)
      AuxTargetScale: 0.5     # 보조 로스의 목표 체급 (기본 0.5)
      # [추가] 각 로스의 특성 분류 (core_dense, aux_dense, sparse 중 택 1)
      # sparse로 지정된 로스는 DLH 연산에서 완전히 제외되어 오버헤드 없이 순수하게 역전파됩니다.
      LossCategories:
        reconstruction: core_dense
        dynamics: core_dense
        representation: aux_dense
        contrastive: aux_dense
        reward: sparse
        termination: sparse
        important_hash: sparse
    Contrastive:
      Enable: false
      Steps: 5
      HiddenSize: 512
      OutSize: 512
      Layers: 2
      LossScale: 0.01
      ExpLambda: 0.75
      Temperature: 0.1
      MaxSamples: 1024
      CropScale: [0.25, 1.0]
      CropRatio: [0.9, 1.1]
    ImportantInfoHashLoss:
      Enable: true
      TriggerType: reward         # [추가] 트리거 방식을 'reward' 또는 'td_error'로 설정합니다. store trigger가 아닌 loss 계산 트리거입니다.
      SigmaThreshold: 2.0
      HashBits: 13
      MaxQueuePerKey: 100000
      MaxPastSamples: 32
      MaxPairsPerBatch: 256
      LossScale: 0.01
      StoreOnlyTriggered: false # 보상 임계값을 초과하지 않는 애들도 일단 해싱해서 저장은 해야 함. 그래야 임계값을 초과하는 애들이 나중에 이런 평범한 샘플과 차별화되도록 비교할 수 있으니깐.
    Adam:
      LearningRate: 1.0e-4
    Laprop:
      LearningRate: 4.0e-5
      Epsilon: 1.0e-20
    Encoder:
      Depth: 64 # 16
      Mults:  [1, 2, 3, 4, 4]
      Norm: rms
      Kernel: 5
      Padding: same
      InputSize: [3, 64, 64]
    Decoder:
      Depth: 64 # 16
      Mults:  [1, 2, 3, 4, 4]
      Norm: rms
      Kernel: 5
      Padding: same
      FirstStrideOne: True
      InputSize: [3, 64, 64]
      FinalLayerSigmoid: True
    Reward:
      HiddenUnits: 1024 #256
      LayerNum: 1
    Termination:
      HiddenUnits: 1024 #256
      LayerNum: 1      
    Transformer:
      FinalFeatureWidth: 4
      NumLayers: 2
      NumHeads: 8
    Mamba:
      n_layer: 2
      d_intermediate: 0
      ssm_cfg:
        d_state: 32 #d_state는 32, 64, 128 만 지원
        is_mimo: false
        mimo_rank: 4
        chunk_size: 16
    

  Agent:
    dtype: float32
    Policy: AC # AC or PPO
    Unimix_ratio: 0.01 # 0
    AC:
      NumLayers: 3
      Gamma: 0.985
      Lambda: 0.95
      EntropyCoef: 3.e-4
      Max_grad_norm: 100
      Warmup_steps: 1000
      Act: SiLU
      Optimiser: Laprop
      Adam:
        LearningRate: 3.0e-5
        Epsilon: 1.0e-5
      Laprop:
        LearningRate: 4.0e-5 # 4.0e-5
        Epsilon: 1.0e-20
      Actor:
        HiddenUnits: 1024 # 256
      Critic:
        HiddenUnits: 1024 # 512
    PPO:
      NumLayers: 3
      Gamma: 0.985
      Lambda: 0.95
      EpsilonClip: 0.2
      K_epochs: 3
      Minibatch: 16384
      CriticCoef: 1
      EntropyCoef: 3.e-4
      KL_threshold: 0.01
      Max_grad_norm: 100
      Warmup_steps: 1000
      Act: SiLU
      Optimiser: Laprop
      Adam:
        LearningRate: 3.e-5
        Epsilon: 1.0e-5
      Laprop:
        LearningRate: 4.0e-5 # 4.0e-5
        Epsilon: 1.0e-20
      Actor:
        HiddenUnits: 256
      Critic:
        HiddenUnits: 512 # Andrychowicz2020 wider critic network seems better  
Wandb:
  Init:
    Mode: online
    Project: Mamba_dreamer
n: standard